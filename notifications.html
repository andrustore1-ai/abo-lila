let salesTab='create';function renderSales(){let st=getState(),inv=active(st.invoices);$('#mainContent').innerHTML='<div class="grid"><section class="hero"><h2>المبيعات والفواتير</h2><p>إنشاء فاتورة، تسجيل عميل جديد، المدفوع، الدين، الحساب المستلم، وسجل الفواتير. لا توجد معاينة فاتورة داخل هذه الصفحة.</p><div class="hero-actions"><button class="btn primary" data-tab="create">'+svg('plus')+' إنشاء فاتورة</button><button class="btn" data-tab="log">'+svg('receipt')+' سجل الفواتير</button><button class="btn" data-tab="pay">'+svg('wallet')+' سند قبض</button></div></section><section class="kpis"><div class="kpi"><span>المبيعات</span><b>'+money(inv.reduce((a,b)=>a+invoiceTotal(b),0))+'</b></div><div class="kpi"><span>الديون</span><b>'+money(active(st.customers).reduce((a,c)=>a+customerDebt(c.id),0))+'</b></div></section><div id="salesPanel"></div></div>';$$('[data-tab]').forEach(b=>b.onclick=()=>{salesTab=b.dataset.tab;renderSalesPanel()});renderSalesPanel()}

function renderInvoiceForm(old=null){$('#salesPanel').innerHTML='<section class="card"><div class="card-title"><h3>إصدار فاتورة</h3><span class="badge info">الفاتورة تعرض من السجل فقط</span></div><form id="invoiceForm" class="form-grid"><input type="hidden" name="id" value="'+(old&&old.id||'')+'"><div class="field"><label>العميل</label><select name="customerId" id="customerSelect" required>'+customerOptions(old&&old.customerId)+'</select></div><div id="newCustomerBox" class="form-grid two" style="display:none"><div class="field"><label>اسم العميل الجديد</label><input class="input" name="newCustomerName"></div><div class="field"><label>رقم الجوال</label><input class="input" name="newCustomerPhone"></div></div><div class="field"><label>الأصناف</label><div id="invoiceLines">'+((old&&old.items||[{}]).map(lineHtml).join(''))+'</div><button type="button" class="btn" id="addLine">'+svg('plus')+' إضافة صنف</button></div><div class="form-grid two"><div class="field"><label>الموزع</label><input class="input" name="seller" value="'+(old&&old.seller||'')+'"></div><div class="field"><label>نوع العملية</label><select name="paymentType"><option>نقدي</option><option>جزئي</option><option>دين</option><option>تحويل</option></select></div><div class="field"><label>المدفوع من المبلغ</label><input class="input" id="paidInput" name="paid" type="number" value="'+(old?num(old.paid):0)+'"></div><div class="field"><label>الحساب الذي يدخل عليه المدفوع</label><select name="accountId">'+accountOptions(old&&old.accountId)+'</select></div></div><div class="invoice-total-box"><span>الإجمالي</span><b class="big" id="invoiceTotal">₪0</b></div><div class="invoice-total-box"><span>الباقي دين</span><b class="big" id="invoiceDebt">₪0</b></div><button class="btn primary">'+svg('check')+' حفظ الفاتورة</button></form></section>';bindInvoice();}
function bindInvoice(){let cust=$('#customerSelect'),box=$('#newCustomerBox');cust.onchange=()=>box.style.display=cust.value==='__new'?'grid':'none';cust.onchange();$('#addLine').onclick=()=>{$('#invoiceLines').insertAdjacentHTML('beforeend',lineHtml());bindLines();calcInv()};bindLines();$('#paidInput').oninput=calcInv;$('#invoiceForm').onsubmit=saveInvoice;calcInv()} function bindLines(){$$('.line-product').forEach(s=>s.onchange=()=>{let p=s.selectedOptions[0],w=s.closest('.invoice-line');if(p&&p.dataset.price)w.querySelector('.line-price').value=p.dataset.price;calcInv()});$$('.line-qty,.line-price').forEach(i=>i.oninput=calcInv);$$('.remove-line').forEach(b=>b.onclick=()=>{b.closest('.invoice-line').remove();calcInv()})}
function collectItems(){return $$('.invoice-line').map(w=>{let s=w.querySelector('.line-product'),o=s.selectedOptions[0],q=num(w.querySelector('.line-qty').value),p=num(w.querySelector('.line-price').value);return{productId:s.value,product:o?o.textContent.split(' - ')[0]:'صنف',qty:q,price:p,total:q*p}}).filter(x=>x.productId&&x.qty>0)} function calcInv(){let total=collectItems().reduce((a,b)=>a+b.total,0),paid=num($('#paidInput')&&$('#paidInput').value);if($('#invoiceTotal'))$('#invoiceTotal').textContent=money(total);if($('#invoiceDebt'))$('#invoiceDebt').textContent=money(Math.max(0,total-paid))}
function saveInvoice(e){e.preventDefault();let d=formData(e.target),st=getState(),items=collectItems();if(!items.length)return toast('أضف صنفاً واحداً على الأقل',true);let cid=d.customerId,cname='';if(cid==='__new'){if(!d.newCustomerName)return toast('اكتب اسم العميل الجديد',true);let c={id:uid('C'),name:d.newCustomerName,phone:d.newCustomerPhone||'',category:'جديد',updatedAt:now()};st.customers.unshift(c);cid=c.id;cname=c.name}else{let c=active(st.customers).find(x=>x.id===cid);if(!c)return toast('اختر العميل',true);cname=c.name}let total=items.reduce((a,b)=>a+b.total,0),paid=Math.min(num(d.paid),total),remaining=Math.max(0,total-paid),txId='';if(paid>0){if(!d.accountId)return toast('اختر الحساب المستلم',true);txId=uid('T');st.transactions.unshift({id:txId,accountId:d.accountId,type:'وارد',amount:paid,source:'فاتورة مبيعات',refId:'',note:'دفعة فاتورة '+cname,date:new Date().toLocaleString('ar'),updatedAt:now()})}items.forEach(it=>{let p=st.products.find(x=>x.id===it.productId);if(p){p.qty=Math.max(0,num(p.qty)-num(it.qty));p.updatedAt=now()}});let inv={id:d.id||uid('INV'),customerId:cid,customerName:cname,seller:d.seller||'',paymentType:d.paymentType,accountId:d.accountId,paid,remaining,items,date:new Date().toLocaleString('ar'),txId,updatedAt:now()};if(txId)st.transactions.find(x=>x.id===txId).refId=inv.id;let i=st.invoices.findIndex(x=>x.id===inv.id);if(i>=0){if(st.invoices[i].txId){let old=st.transactions.find(t=>t.id===st.invoices[i].txId);if(old){old.deleted=true;old.updatedAt=now();st._deleted[old.id]=old.updatedAt}}st.invoices[i]={...st.invoices[i],...inv}}else st.invoices.unshift(inv);saveState(st);salesTab='log';renderSales();toast('تم حفظ الفاتورة')}

function savePayment(e){e.preventDefault();let d=formData(e.target),st=getState(),c=active(st.customers).find(x=>x.id===d.customerId);if(!c)return toast('اختر العميل',true);let p={id:d.id||uid('PAY'),customerId:c.id,customerName:c.name,amount:num(d.amount),accountId:d.accountId,note:d.note||'',date:new Date().toLocaleString('ar'),updatedAt:now()};let old=st.payments.find(x=>x.id===p.id);if(old&&old.txId){let tx=st.transactions.find(t=>t.id===old.txId);if(tx){tx.deleted=true;tx.updatedAt=now();st._deleted[tx.id]=tx.updatedAt}}p.txId=uid('T');st.transactions.unshift({id:p.txId,accountId:p.accountId,type:'وارد',amount:p.amount,source:'سند قبض',refId:p.id,note:'قبض من '+c.name,date:p.date,updatedAt:now()});let i=st.payments.findIndex(x=>x.id===p.id);if(i>=0)st.payments[i]={...st.payments[i],...p};else st.payments.unshift(p);saveState(st);renderPayment();toast('تم حفظ السند')}

function renderDebts(){let st=getState(),debtors=active(st.customers).filter(c=>customerDebt(c.id)>0);$('#mainContent').innerHTML='<div class="grid"><section class="hero"><h2>الديون والتحصيل</h2><p>إضافة دفعة أو سداد كامل مع اختيار الحساب.</p></section><section class="card"><form id="debtPay" class="form-grid two"><div class="field"><label>العميل</label><select name="customerId" required>'+customerOptions()+'</select></div><div class="field"><label>المبلغ</label><input class="input" name="amount" type="number" required></div><div class="field"><label>الحساب المستلم</label><select name="accountId" required>'+accountOptions()+'</select></div><button class="btn primary">'+svg('check')+' إضافة دفعة</button></form></section><section class="grid grid-2">'+(debtors.length?debtors.map(c=>'<article class="item-card"><div class="item-head"><div><h4 class="item-title">'+c.name+'</h4><div class="item-sub">الدين الحالي</div></div><b>'+money(customerDebt(c.id))+'</b></div><div class="actions" style="margin-top:12px"><button class="btn ok" data-settle="'+c.id+'">'+svg('check')+' سداد كامل</button></div></article>').join(''):'<div class="empty">لا توجد ديون</div>')+'</section>'+paymentList()+'</div>';$('#debtPay').onsubmit=savePayment;$$('[data-settle]').forEach(b=>b.onclick=()=>{let c=active(getState().customers).find(x=>x.id===b.dataset.settle),acc=active(getState().accounts)[0];if(!acc)return toast('أضف حساباً أولاً',true);let st=getState(),p={id:uid('PAY'),customerId:c.id,customerName:c.name,amount:customerDebt(c.id),accountId:acc.id,note:'سداد كامل',date:new Date().toLocaleString('ar'),updatedAt:now(),txId:uid('T')};st.payments.unshift(p);st.transactions.unshift({id:p.txId,accountId:p.accountId,type:'وارد',amount:p.amount,source:'سداد دين',refId:p.id,note:'سداد كامل من '+c.name,date:p.date,updatedAt:now()});saveState(st);renderDebts()});bindActions()}

function renderSuppliers(){simplePage('الموردون','إدارة الموردين وحساباتهم.','suppliers','<form id="f" class="form-grid two"><input type="hidden" name="id"><div class="field"><label>اسم المورد</label><input class="input" name="name" required></div><div class="field"><label>رقم الجوال</label><input class="input" name="phone"></div><button class="btn primary">'+svg('check')+' حفظ المورد</button></form>',s=>'<article class="item-card"><h4 class="item-title">'+s.name+'</h4><div class="item-sub">'+(s.phone||'لا يوجد رقم')+'</div><div class="actions" style="margin-top:12px"><button class="btn" data-edit="suppliers" data-id="'+s.id+'">'+svg('edit')+' تعديل</button><button class="btn danger" data-del="suppliers" data-id="'+s.id+'">'+svg('trash')+' حذف</button></div></article>');$('#f').onsubmit=e=>{e.preventDefault();upsert('suppliers',formData(e.target))}}
function renderEmployees(){let st=getState(),permsHtml=PERMISSIONS.map(p=>'<label class="perm-item"><input type="checkbox" name="perms" value="'+p[0]+'"><span>'+p[1]+'</span></label>').join('');$('#mainContent').innerHTML='<div class="grid"><section class="hero"><h2>الموظفون والصلاحيات</h2><p>إضافة موظف بكلمة مرور مستقلة وتحديد الصفحات المسموح له بالدخول إليها.</p></section><section class="card"><form id="employeeForm" class="form-grid two"><input type="hidden" name="id"><div class="field"><label>اسم الموظف</label><input class="input" name="name" required></div><div class="field"><label>كلمة مرور الموظف</label><input class="input" name="password" type="password" placeholder="كلمة مرور خاصة بالموظف"></div><div class="field"><label>الدور</label><select name="role"><option>مدير</option><option>مسؤول مصنع</option><option>موزع</option><option>محاسب</option></select></div><div class="field"><label>رقم الجوال</label><input class="input" name="phone"></div><div class="field wide"><label>الصلاحيات</label><div class="perm-grid">'+permsHtml+'</div></div><button class="btn primary">'+svg('check')+' حفظ الموظف</button></form></section><section class="grid grid-2">'+active(st.employees).map(e=>'<article class="item-card"><div class="item-head"><div><h4 class="item-title">'+e.name+'</h4><div class="item-sub">'+(e.role||'موظف')+'</div></div><span class="badge info">'+((e.perms||[]).includes('الكل')?'كل الصلاحيات':(e.perms||[]).length+' صلاحيات')+'</span></div><div class="perm-tags">'+((e.perms||[]).includes('الكل')?'<span class="badge ok">كل النظام</span>':(e.perms||[]).map(p=>'<span class="badge gray">'+((PERMISSIONS.find(x=>x[0]===p)||[])[1]||p)+'</span>').join(''))+'</div><div class="actions" style="margin-top:12px"><button class="btn" data-emp-edit="'+e.id+'">'+svg('edit')+' تعديل</button><button class="btn danger" data-emp-del="'+e.id+'">'+svg('trash')+' حذف</button></div></article>').join('')+'</section></div>';let form=$('#employeeForm');form.onsubmit=e=>{e.preventDefault();let d=formData(e.target);let existing=st.employees.find(x=>x.id===d.id);let checked=$$('[name="perms"]',form).filter(x=>x.checked).map(x=>x.value);if(d.role==='مدير')checked=['الكل'];if(!d.password&&existing)d.password=existing.password||'';if(!d.password){toast('أدخل كلمة مرور للموظف',true);return}upsert('employees',{...d,perms:checked})};$$('[data-emp-edit]').forEach(b=>b.onclick=()=>{let e=getState().employees.find(x=>x.id===b.dataset.empEdit);if(!e)return;form.querySelector('[name=id]').value=e.id;form.querySelector('[name=name]').value=e.name||'';form.querySelector('[name=password]').value='';form.querySelector('[name=password]').placeholder='اتركه فارغًا للاحتفاظ بكلمة المرور';form.querySelector('[name=role]').value=e.role||'موزع';form.querySelector('[name=phone]').value=e.phone||'';$$('[name="perms"]',form).forEach(c=>c.checked=(e.perms||[]).includes(c.value)||(e.perms||[]).includes('الكل'));form.scrollIntoView({behavior:'smooth',block:'start'})});$$('[data-emp-del]').forEach(b=>b.onclick=()=>softDelete('employees',b.dataset.empDel));}
function renderManufacturing(){simplePage('التصنيع والباتش','تسجيل الإنتاج واستهلاك المواد الخام وتكلفة الباتش.','production','<form id="f" class="form-grid two"><input type="hidden" name="id"><div class="field"><label>الوصفة</label><input class="input" name="recipe" required></div><div class="field"><label>رقم الباتش</label><input class="input" name="batch"></div><div class="field"><label>التكلفة</label><input class="input" name="cost" type="number"></div><button class="btn primary">'+svg('check')+' حفظ الإنتاج</button></form>',p=>'<article class="item-card"><h4 class="item-title">'+p.recipe+'</h4><div class="item-sub">باتش: '+(p.batch||'—')+'</div><div class="actions" style="margin-top:12px"><button class="btn" data-edit="production" data-id="'+p.id+'">'+svg('edit')+' تعديل</button><button class="btn danger" data-del="production" data-id="'+p.id+'">'+svg('trash')+' حذف</button></div></article>');$('#f').onsubmit=e=>{e.preventDefault();upsert('production',formData(e.target))}}

function renderAnalytics(){let k=kpis();$('#mainContent').innerHTML='<div class="grid"><section class="hero"><h2>التحليلات</h2><p>مؤشرات الأداء، التوقعات، الربحية، تحليل السلة والعملاء.</p></section><section class="kpis"><div class="kpi"><span>المبيعات</span><b>'+money(k.sales)+'</b></div><div class="kpi"><span>التحصيل</span><b>'+money(k.paid)+'</b></div><div class="kpi"><span>الديون</span><b>'+money(k.debt)+'</b></div><div class="kpi"><span>المصاريف</span><b>'+money(k.exp)+'</b></div></section></div>'}
function renderLogin(){let st=getState(),s=st.settings,emps=active(st.employees).filter(e=>e.password!==undefined);let empOpts=emps.map(e=>'<option value="'+e.id+'">'+e.name+' - '+(e.role||'موظف')+'</option>').join('');$('#mainContent').innerHTML='<section class="login-card card"><div class="logo store-logo" style="margin:auto;width:86px;height:86px"></div><h1 class="login-title">تسجيل الدخول</h1><p class="login-sub">دخول المدير والموظفين حسب الصلاحيات المحددة من لوحة الإدارة.</p><div class="login-type"><button type="button" id="adminType" class="active">مدير</button><button type="button" id="empType">موظف</button></div><form id="loginForm" class="form-grid"><input type="hidden" name="type" value="admin"><div class="field emp-only" style="display:none"><label>الموظف</label><select name="employeeId">'+empOpts+'</select></div><div class="field"><label>كلمة المرور</label><input class="input" name="pass" type="password" autocomplete="current-password" autofocus required></div><button class="btn primary">'+svg('check')+' دخول</button></form></section>';applyTheme();let setType=t=>{let emp=t==='employee';$('#loginForm [name=type]').value=t;$('#adminType').classList.toggle('active',!emp);$('#empType').classList.toggle('active',emp);$('.emp-only').style.display=emp?'grid':'none'};$('#adminType').onclick=()=>setType('admin');$('#empType').onclick=()=>setType('employee');$('#loginForm').onsubmit=async e=>{e.preventDefault();let btn=e.target.querySelector('button');let old=btn?btn.innerHTML:'';if(btn){btn.disabled=true;btn.textContent='جاري التحقق...'}await refreshFromFirebase();let fresh=getState(),freshSettings=fresh.settings||{},freshEmployees=active(fresh.employees).filter(x=>x.password!==undefined);let d=formData(e.target),pass=String(d.pass||'');if(d.type==='admin'){if(pass===String(freshSettings.password||'0000')){sessionStorage.setItem(SESSION_KEY,JSON.stringify({type:'admin',name:'المدير العام',role:'مدير',perms:['الكل']}));sessionStorage.setItem('LOGIN','1');location.href='dashboard.html'}else{if(btn){btn.disabled=false;btn.innerHTML=old}toast('كلمة المرور غير صحيحة',true)}return}let emp=freshEmployees.find(x=>x.id===d.employeeId);if(emp&&pass===String(emp.password||'')){let perms=Array.isArray(emp.perms)?emp.perms:[];sessionStorage.setItem(SESSION_KEY,JSON.stringify({type:'employee',id:emp.id,name:emp.name,role:emp.role,perms}));sessionStorage.setItem('LOGIN','1');location.href=firstAllowedPage({perms})+'.html'}else{if(btn){btn.disabled=false;btn.innerHTML=old}toast('بيانات الموظف غير صحيحة',true)}}}
function renderInvoice(){let q=new URLSearchParams(location.search),id=q.get('id');if(q.get('view')!=='1'||!id){$('#mainContent').innerHTML='<div class="grid"><section class="hero"><h2>لا توجد فاتورة مفتوحة</h2><p>الفاتورة تظهر فقط من سجل الفواتير داخل صفحة المبيعات.</p><div class="hero-actions"><a class="btn primary" href="sales.html">'+svg('receipt')+' رجوع للمبيعات</a></div></section></div>';return}let inv=active(getState().invoices).find(x=>x.id===id);if(!inv)return $('#mainContent').innerHTML='<div class="empty">الفاتورة غير موجودة</div>';$('#mainContent').innerHTML='<div class="grid"><section class="card print-actions"><div class="actions"><button class="btn primary" onclick="window.print()">'+svg('print')+' طباعة حرارية</button><button class="btn" onclick="window.print()">'+svg('download')+' حفظ كملف</button><a class="btn" href="sales.html">'+svg('receipt')+' رجوع للمبيعات</a></div></section><section class="print-sheet"><div class="logo store-logo" style="margin:auto"></div><div class="print-title store-name"></div><div class="print-sub">فاتورة مبيعات حرارية</div><div class="dash"></div><div class="print-row"><b>رقم:</b><b>'+inv.id+'</b></div><div class="print-row"><span>العميل:</span><b>'+inv.customerName+'</b></div><div class="print-row"><span>الوقت:</span><span>'+inv.date+'</span></div><div class="dash"></div><table class="print-table"><thead><tr><th>الصنف</th><th>كمية</th><th>سعر</th><th>إجمالي</th></tr></thead><tbody>'+inv.items.map(it=>'<tr><td>'+it.product+'</td><td>'+it.qty+'</td><td>'+money(it.price)+'</td><td>'+money(it.total)+'</td></tr>').join('')+'</tbody></table><div class="dash"></div><div class="print-row"><b>الإجمالي</b><b>'+money(invoiceTotal(inv))+'</b></div><div class="print-row"><span>المدفوع:</span><span>'+money(inv.paid)+'</span></div><div class="print-row"><span>دين:</span><span>'+money(inv.remaining)+'</span></div></section></div>';applyTheme()}

function deletePayment(id){if(!confirm('تأكيد حذف سند القبض؟'))return;let st=getState(),p=st.payments.find(x=>x.id===id);if(!p)return;if(p.txId){let tx=st.transactions.find(t=>t.id===p.txId);if(tx){tx.deleted=true;tx.updatedAt=now();st._deleted[tx.id]=tx.updatedAt}}p.deleted=true;p.updatedAt=now();st._deleted[p.id]=p.updatedAt;saveState(st);renderCurrent();toast('تم حذف سند القبض');}

function bindActions(){$$('[data-edit]').forEach(b=>b.onclick=()=>{let x=(getState()[b.dataset.edit]||[]).find(a=>a.id===b.dataset.id),f=document.querySelector('form');if(!x||!f)return;Object.keys(x).forEach(k=>{let e=f.querySelector('[name="'+k+'"]');if(e)e.value=x[k]});f.scrollIntoView({behavior:'smooth',block:'center'})});$$('[data-del]').forEach(b=>b.onclick=()=>softDelete(b.dataset.del,b.dataset.id));$$('[data-del-pay]').forEach(b=>b.onclick=()=>deletePayment(b.dataset.delPay));$$('[data-edit-pay]').forEach(b=>b.onclick=()=>{let p=active(getState().payments).find(x=>x.id===b.dataset.editPay);salesTab='pay';renderPayment();let f=$('#payForm');if(p&&f){f.querySelector('[name=id]').value=p.id;f.querySelector('[name=customerId]').value=p.customerId;f.querySelector('[name=amount]').value=p.amount;f.querySelector('[name=accountId]').value=p.accountId}})}
function renderAccessDenied(){let u=currentUser();$('#mainContent').innerHTML='<section class="card denied-card"><h2>لا تملك صلاحية الدخول</h2><p>هذه الصفحة غير مفعّلة لحساب '+(u&&u.name?u.name:'المستخدم')+'. تواصل مع المدير لتعديل الصلاحيات.</p><div class="actions" style="justify-content:center"><a class="btn primary" href="'+firstAllowedPage()+'.html">'+svg('home')+' الصفحة المسموحة</a><button class="btn danger" onclick="logout()">'+svg('x')+' تسجيل خروج</button></div></section>'}
function renderCurrent(){applyTheme();if(PAGE!=='login'&&!canAccess(PAGE)){renderAccessDenied();setIcons();applyTheme();return}if(PAGE==='dashboard')renderDashboard();else if(PAGE==='inventory')renderInventory();else if(PAGE==='sales')renderSales();else if(PAGE==='customers')renderCustomers();else if(PAGE==='debts')renderDebts();else if(PAGE==='finance')renderFinance();else if(PAGE==='settings')renderSettings();else if(PAGE==='accounts')renderAccounts();else if(PAGE==='account-ledger')renderAccountLedger();else if(PAGE==='suppliers')renderSuppliers();else if(PAGE==='employees')renderEmployees();else if(PAGE==='manufacturing')renderManufacturing();else if(PAGE==='notifications')renderNotifications();else if(PAGE==='analytics')renderAnalytics();else if(PAGE==='login')renderLogin();else if(PAGE==='invoice')renderInvoice();else if(PAGE==='device')$('#mainContent').innerHTML='<div class="hero"><h2>ربط الجهاز</h2><p>تحقق الجهاز والعمل الميداني.</p></div>';setIcons();applyTheme()}
document.addEventListener('DOMContentLoaded',()=>{init();if(document.getElementById('mainContent')){renderCurrent();if(PAGE==='login'){refreshFromFirebase().then(()=>renderCurrent())}else{refreshFromFirebase().then(()=>{if(currentUser())renderCurrent()})}}if('serviceWorker' in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('sw.js').catch(()=>{})});
</script></body></html>
